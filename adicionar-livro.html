<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Livros</title>

    <!-- CSS PADRÃO -->
    <link rel="stylesheet" href="css/layout.css">

    <!-- CSS ESPECÍFICO DA PÁGINA -->
    <link rel="stylesheet" href="css/adicionar-livro.css">
</head>

<body>

    <!-- MENU LATERAL PADRÃO -->
 <nav id="menu-lateral" class="menu-lateral">

        <div class="fechar-menu" onclick="toggleMenu()">✕</div>
         <a href="catalogo-admin.html" class="menu-item">CATÁLOGO</a>
         <a href="meu-perfil-ADM.html" class="menu-item">MEU PERFIL</a>
         <a href="adicionar-livro.html" class="menu-item">ADICIONAR LIVROS</a>
         <a href="emprestimo.html" class="menu-item">EMPRÉSTIMOS</a>
         <a href="controle-estoque.html" class="menu-item">CONTROLE DE ESTOQUE</a>
         <a href="controle-usuario.html" class="menu-item">CONTROLE DE USUÁRIOS</a>
        </nav>

    <!-- HEADER PADRÃO -->
    <header class="header">

        <div class="menu-hamburguer" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="logo-header">
            <img src="img/logo-capa-e-barra-de-pesquisa.png"
                 alt="Logo Ler e Educar"
                 class="logo-img">

            <span class="logo-text">LER E EDUCAR</span>
        </div>

        <input type="text"
               placeholder="Buscar livro..."
               class="busca">

        <div class="header-direita">
            <div class="usuario">
                Olá,
                <span id="nome-usuario-logado">
                    Administrador
                </span>
            </div>

            <a href="index.html" class="sair">
                SAIR
            </a>
        </div>

    </header>

    <!-- CONTEÚDO DA PÁGINA -->
    <main class="pagina-adicionar-livro">

    <h1 class="titulo-pagina">
        ADICIONAR LIVROS
    </h1>

    <form class="form-livro">

        <!-- LADO ESQUERDO -->
        <div class="coluna-esquerda">

            <div class="input-group">
                <label>Nome do livro:</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Autor:</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Sinopse do livro:</label>
                <textarea rows="5"></textarea>
            </div>

        </div>

        <!-- LADO DIREITO -->
        <div class="coluna-direita">

            <div class="input-group">
                <label>Ano de lançamento:</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Faixa etária:</label>
                <input type="text">
            </div>

            <div class="upload-capa">

                <label for="capaLivro" class="caixa-upload">
                    +
                </label>

                <input
                    type="file"
                    id="capaLivro"
                    hidden>

                <span>Capa do livro</span>

            </div>

            <button type="submit" class="btn-adicionar">
                ADICIONAR AO CATÁLOGO
            </button>

        </div>

    </form>

</main>
    
    <script src="js/layout.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
