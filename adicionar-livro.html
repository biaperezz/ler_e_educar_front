<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Livros</title>

    <link rel="stylesheet" href="css/layout.css">

    <link rel="stylesheet" href="css/adicionar-livro.css">
</head>

<body>

    <nav id="menu-lateral" class="menu-lateral">
        <div class="fechar-menu" onclick="toggleMenu()">✕</div>
         <a href="catalogo-admin.html" class="menu-item">CATÁLOGO</a>
         <a href="meu-perfil-adm.html" class="menu-item ativo">MEU PERFIL</a>
        <a href="adicionar-livro.html" class="menu-item">ADICIONAR LIVROS</a>
        <a href="emprestimo.html" class="menu-item">EMPRÉSTIMOS</a>
        <a href="devolucao.html" class="menu-item">DEVOLUÇÕES</a>
        <a href="controle-estoque.html" class="menu-item">CONTROLE DE ESTOQUE</a>
        <a href="controle-usuario.html" class="menu-item">CONTROLE DE USUÁRIOS</a>

    <header class="header">
        <div class="menu-hamburguer" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="logo-header">
            <img src="img/logo-capa-e-barra-de-pesquisa.png" alt="Logo Ler e Educar" class="logo-img">
            <span class="logo-text">LER E EDUCAR</span>
        </div>

        <input type="text" placeholder="Buscar livro..." class="busca">

        <div class="header-direita">
            <div class="usuario">
                Olá, <span id="nome-usuario-logado">Administrador</span>
            </div>
            <a href="index.html" class="sair">SAIR</a>
        </div>
    </header>

    <main class="pagina-adicionar-livro">

        <h1 class="titulo-pagina">ADICIONAR LIVROS</h1>
        
        <form class="form-livro" id="formLivro">

            <div class="coluna-esquerda">
                <div class="input-group">
                    <label for="titulo">Nome do livro:</label>
                    <input type="text" id="titulo" name="titulo" required>
                </div>

                <div class="input-group">
                    <label for="autor">Autor:</label>
                    <input type="text" id="autor" name="autor" required>
                </div>

                <div class="input-group">
                    <label for="sinopse">Sinopse do livro:</label>
                    <textarea id="sinopse" name="sinopse" rows="5" required></textarea>
                </div>
            </div>

            <div class="coluna-direita">
                <div class="input-group">
                    <label for="anoLancamento">Ano de lançamento:</label>
                    <input type="number" id="anoLancamento" name="anoLancamento" min="1900" max="2100">
                </div>

                <div class="input-group">
                    <label for="faixaEtaria">Faixa etária:</label>
                    <input type="text" id="faixaEtaria" name="faixaEtaria" placeholder="Ex: 8+">
                </div>

                <div class="input-group">
                    <label for="isbn">ISBN:</label>
                    <input type="text" id="isbn" name="isbn" maxlength="13" placeholder="9788535902778">
                </div>

                <div class="input-group">
                    <label for="editora">Editora:</label>
                    <input type="text" id="editora" name="editora" placeholder="Digite o nome da editora" maxlength="100" required>
                </div>

                <div class="input-group">
                    <label for="categoria">Categoria:</label>
                    <select id="categoria" name="categoria" required>
                        <option value="">Selecione uma categoria</option>
                        <option value="conto-de-fadas">Conto de Fadas</option>
                        <option value="fabulas">Fábulas</option>
                        <option value="alfabetizacao">Alfabetização e Letramento</option>
                        <option value="ciencias-natureza">Ciências da Natureza</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="quantidadeEstoque">Quantidade em estoque:</label>
                    <input type="number" id="quantidadeEstoque" name="quantidadeEstoque" min="0" step="1" required>
                </div>

                <div class="upload-capa">
                    <label for="capaLivro" class="caixa-upload">+</label>
                    <input type="file" id="capaLivro" name="capaLivro" accept="image/*" hidden>
                    <span>Capa do livro</span>
                </div>

                <button type="submit" class="btn-adicionar" id="btnAdicionarLivro">
                    ADICIONAR AO CATÁLOGO
                </button>
            </div>

            <div class="container-btn-salvar">
                <button type="submit" class="btn-salvar">
                    Salvar Livro
                </button>
            </div>

        </form>
        
    </main>
        
    <script src="js/layout.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
