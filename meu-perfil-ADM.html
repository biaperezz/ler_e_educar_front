<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meu Perfil - Administrador</title>

    <!-- Layout padrão -->
    <link rel="stylesheet" href="css/layout.css">

    <!-- CSS específico da página -->
    <link rel="stylesheet" href="css/meu-perfil-ADM.css">
</head>

<body>

    <!-- MENU LATERAL -->
    <nav id="menu-lateral" class="menu-lateral">
        <div class="fechar-menu" onclick="toggleMenu()">✕</div>

        <a href="meu-perfil-adm.html" class="menu-item ativo">MEU PERFIL</a>
        <a href="adicionar-livro.html" class="menu-item">ADICIONAR LIVROS</a>
        <a href="emprestimo.html" class="menu-item">EMPRÉSTIMOS</a>
        <a href="devolucao.html" class="menu-item">DEVOLUÇÕES</a>
        <a href="controle-estoque.html" class="menu-item">CONTROLE DE ESTOQUE</a>
        <a href="controle-usuario.html" class="menu-item">CONTROLE DE USUÁRIOS</a>
    </nav>

    <!-- HEADER PADRÃO -->
    <header class="header">

        <div class="menu-hamburguer" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="logo-header">
            <img src="img/logo-capa-e-barra-de-pesquisa.png"
                 alt="Logo Ler e Educar"
                 class="logo-img">

            <span class="logo-text">
                LER E EDUCAR
            </span>
        </div>

        <input type="text"
               placeholder="Buscar livro..."
               class="busca">

        <div class="header-direita">
            <div class="usuario">
                Olá,
                <span id="adminName">Administrador</span>
            </div>

            <a href="index.html" class="sair">
                SAIR
            </a>
        </div>

    </header>

   <main class="perfil-adm-bg fundo-canva">
        <div class="perfil-adm-container">
            <h1>MEU PERFIL - ADMINISTRADOR</h1>

            <p class="subtitulo">
                Meus dados
            </p>

            <form class="perfil-form">

                <div class="linha">
                    <div class="campo">
                        <label>Nome completo</label>
                        <input type="text" id="nomeCompleto" placeholder="Carregando nome...">
                    </div>

                    <div class="campo campo-pequeno">
                        <label>Data de admissão</label>
                        <input type="text" placeholder="DD/MM/AAAA" id="dataAdmissao">
                    </div>
                </div>

                <div class="campo">
                    <label>CPF</label>
                    <input type="text" id="cpf" placeholder="Carregando CPF...">
                </div>

                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="Carregando e-mail...">
                </div>

                <div class="campo">
                    <label>Telefone</label>
                    <input type="text" id="telefone" placeholder="Carregando telefone...">
                </div>
            </form>
         </div>
    </main>
<footer>

    <p>

      Projeto Biblioteca Ler e Educar - Faculdade Impacta 2026

    </p>

  </footer>
    <script src="js/layout.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
