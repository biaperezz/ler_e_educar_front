<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Livro</title>

    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/detalhes-livro-adm.css">
</head>

<body>

    <!-- MENU LATERAL -->
    <nav id="menu-lateral" class="menu-lateral">

        <div class="fechar-menu" onclick="toggleMenu()">✕</div>

        <a href="catalogo-admin.html" class="menu-item">CATÁLOGO</a>
        <a href="meu-perfil-ADM.html" class="menu-item">MEU PERFIL</a>
        <a href="adicionar-livro.html" class="menu-item">ADICIONAR LIVROS</a>
        <a href="emprestimo.html" class="menu-item">EMPRÉSTIMOS</a>
        <a href="controle-estoque.html" class="menu-item">CONTROLE DE ESTOQUE</a>
        <a href="controle-usuario.html" class="menu-item">CONTROLE DE USUÁRIOS</a>

    </nav>

    <!-- HEADER -->
    <header class="header">

        <div class="menu-hamburguer" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="logo-header">
            <img src="img/logo-capa-e-barra-de-pesquisa.png"
                 alt="Logo Ler e Educar"
                 class="logo-img">

            <span class="logo-text">LER E EDUCAR</span>
        </div>

        <input type="text"
               placeholder="Buscar livro..."
               class="busca">

        <div class="header-direita">

            <div class="usuario">
                Olá,
                <span id="nome-usuario-logado">
                    Administrador
                </span>
            </div>

            <a href="index.html" class="sair">
                SAIR
            </a>

        </div>

    </header>

    <!-- CONTEÚDO -->
    <main class="pagina-detalhes-livro">

        <div class="detalhes-container">

            <div class="livro-topo">

                <div class="capa-livro">
                    <img src="img/capa-historia-de-dois-amores.png"
                         alt="Capa do Livro">
                </div>

                <div class="info-livro">

                    <h1 id="bookTitle">
                        HISTÓRIA DE DOIS AMORES
                    </h1>

                    <div class="dados-livro">

                        <p><strong>Texto:</strong> <span id="bookAuthor"></span></p>

                        <p><strong>Ilustração:</strong> <span id="bookIllustration"></span></p>

                        <p><strong>Editora:</strong> <span id="bookPublisher"></span></p>

                        <p><strong>Faixa Etária:</strong> <span id="bookAge"></span></p>

                        <p><strong>Ano:</strong> <span id="bookYear"></span></p>

                        <p><strong>País:</strong> <span id="bookCountry"></span></p>

                        <p><strong>ISBN:</strong> <span id="bookIsbn"></span></p>

                        <p><strong>Páginas:</strong> <span id="bookPages"></span></p>

                    </div>

                    <div class="acoes-admin">

                        <button class="btn-admin btn-editar">
                            EDITAR LIVRO
                        </button>

                        <button class="btn-admin btn-remover">
                            REMOVER LIVRO
                        </button>

                    </div>

                </div>

            </div>

            <section class="sinopse-livro">

                <h2>Sinopse</h2>

                <p id="bookSynopsis">
                    Texto da sinopse do livro...
                </p>

                <a href="#" class="link-ver-mais">
                    Ver Mais
                </a>

            </section>

            <div class="voltar-container">
                <a href="catalogo-admin.html" class="link-voltar">
                    ← Voltar ao catálogo
                </a>
            </div>

        </div>

    </main>

    <script src="js/layout.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
