<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil - Ler e Educar</title>
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/perfil-usuario.css">
</head>
<body>

  <nav id="menu-lateral" class="menu-lateral">
    <div class="fechar-menu" onclick="toggleMenu()">✕</div>
    <a href="catalogo.html" class="menu-item ativo">CATÁLOGO</a>
    <a href="perfil-usuario.html" class="menu-item">MEU PERFIL</a>
    <a href="#" class="menu-item">PRIVACIDADE</a>
    <a href="reservas.html" class="menu-item">MINHAS RESERVAS</a>
    <a href="devolutivas.html" class="menu-item">DEVOLUÇÕES</a>
  </nav>

<header class="header">

  <div class="menu-hamburguer" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="logo-header">
    <img
      src="img/logo-capa-e-barra-de-pesquisa.png"
      alt="Logo Ler e Educar"
      class="logo-img"
    >

    <span class="logo-text">
      LER E EDUCAR
    </span>
  </div>

  <input
    type="text"
    placeholder="Buscar livro..."
    class="busca"
  >

  <div class="header-direita">

    <div class="usuario">
      Olá,
      <span id="nome-usuario-logado">
        Gestor
      </span>
    </div>

    <a href="index.html" class="sair">
      SAIR
    </a>

  </div>

</header>

  <main class="fundo-canva fundo-perfil">
    <div class="perfil-container">
      <h1 class="perfil-titulo">MEU PERFIL - NOME DA INSTITUIÇÃO</h1>
      <p class="perfil-sub">Meus dados</p>

      <form class="perfil-formulario">
        <div class="campo-grupo">
          <label>Nome completo</label>
          <input type="text" placeholder="Carregando nome..." disabled>
        </div>

        <div class="campo-grupo">
          <label>Instituição</label>
          <input type="text" placeholder="Carregando instituição..." disabled>
        </div>

        <div class="campo-grupo">
          <label>E-mail institucional</label>
          <input type="email" placeholder="Carregando e-mail..." disabled>
        </div>

        <div class="linha-dupla">
          <div class="campo-grupo">
            <label>CNPJ</label>
            <input type="text" placeholder="Carregando CNPJ..." disabled>
          </div>
          <div class="campo-grupo">
            <label>Telefone</label>
            <input type="text" placeholder="Carregando telefone..." disabled>
          </div>
        </div>

        <div class="linha-dupla">
          <div class="campo-grupo">
            <label>Endereço</label>
            <input type="text" placeholder="Carregando endereço..." disabled>
          </div>
          <div class="campo-grupo">
            <label>CEP</label>
            <input type="text" placeholder="Carregando CEP..." disabled>
          </div>
        </div>
      </form>
    </div>
  </main>

  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
