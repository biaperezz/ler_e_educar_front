<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <title>Ler e Educar</title>

  <link rel="stylesheet" href="css/cadastro.css">

</head>

<body>

  <a href="index.html" class="sair">
    SAIR
  </a>

  <div class="container-cadastro">

    <!-- LOGO -->
    <div class="logo-area">

      <img src="img/logo-capa-e-barra-de-pesquisa.png" class="logo">

      <h1>LER E EDUCAR</h1>

    </div>

    <!-- COLUNA ESQUERDA -->
    <div class="coluna">

      <h2>CADASTRAR NOVA INSTITUIÇÃO</h2>

      <input type="text" placeholder="Nome da Instituição">

      <input type="text" placeholder="Razão Social">

      <input type="email" placeholder="E-mail Institucional">

      <input type="text" placeholder="Telefone da Instituição">

      <input type="text" placeholder="CNPJ da Instituição">

      <input type="text" placeholder="NICHO ESCOLAR">

      <h2 class="titulo-gestor">
        GESTOR DE ENSINO DA INSTITUIÇÃO
      </h2>

      <input type="text" placeholder="Nome do gestor de ensino">

      <input type="text" placeholder="Telefone para contato">

    </div>

    <!-- COLUNA DIREITA -->
    <div class="coluna">

      <h2>ENDEREÇO</h2>

      <input type="text" placeholder="CEP da Instituição">

      <input type="text" placeholder="Logradouro">

      <input type="text" placeholder="Número">

      <input type="text" placeholder="Bairro">

      <input type="text" placeholder="Cidade">

      <input type="text" placeholder="UF">

      <h2 class="titulo-confirmacao">
  CONFIRMAÇÃO DE EMAIL E SENHA
</h2>

<input type="email" placeholder="E-mail Institucional">

<input type="password" placeholder="SENHA">

    </div>

  </div>

  <!-- BOTÃO -->
  <div class="botao-area">

    <a href="login.html" class="botao-cadastro">
      Concluir cadastro
    </a>

  </div>

</body>
</html>
