<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <div class="logo">
      LER E EDUCAR
    </div>

  </header>


  <!-- CONTEÚDO -->
  <main class="container">

    <h1>Login</h1>

    <input
      type="email"
      id="email"
      placeholder="Email"
    >

    <br><br>

    <input
      type="password"
      id="senha"
      placeholder="Senha"
    >

    <br><br>

    <button onclick="fazerLogin()">
      Entrar
    </button>

  </main>


  <!-- RODAPÉ -->
  <footer>

    <p>
      Projeto Biblioteca © 2026
    </p>

  </footer>


  <!-- JAVASCRIPT -->
  <script src="js/app.js"></script>

</body>
</html>
