<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>

    <!-- Layout padrão -->
    <link rel="stylesheet" href="css/layout.css">

    <!-- CSS específico da página -->
    <link rel="stylesheet" href="css/controle-estoque.css">
</head>

<body>

    <!-- MENU LATERAL PADRÃO -->
   <nav id="menu-lateral" class="menu-lateral">

        <div class="fechar-menu" onclick="toggleMenu()">✕</div>
         <a href="catalogo-admin.html" class="menu-item">CATÁLOGO</a>
         <a href="meu-perfil-ADM.html" class="menu-item">MEU PERFIL</a>
         <a href="adicionar-livro.html" class="menu-item">ADICIONAR LIVROS</a>
         <a href="emprestimo.html" class="menu-item">EMPRÉSTIMOS</a>
         <a href="controle-estoque.html" class="menu-item">CONTROLE DE ESTOQUE</a>
         <a href="controle-usuario.html" class="menu-item">CONTROLE DE USUÁRIOS</a>
        </nav>

    <!-- HEADER PADRÃO -->
    <header class="header">

        <div class="menu-hamburguer" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="logo-header">
            <img
                src="img/logo-capa-e-barra-de-pesquisa.png"
                alt="Logo Ler e Educar"
                class="logo-img"
            >

            <span class="logo-text">
                LER E EDUCAR
            </span>
        </div>

        <input
            type="text"
            placeholder="Buscar livro..."
            class="busca"
        >

        <div class="header-direita">

            <div class="usuario">
                Olá,
                <span id="nome-usuario-logado">
                    Administrador
                </span>
            </div>

            <a href="index.html" class="sair">
                SAIR
            </a>

        </div>

    </header>

    <!-- CONTEÚDO -->
    <main class="pagina-estoque-bg fundo-canva">

        <div class="estoque-container">

            <h1>CONTROLE DE ESTOQUE</h1>

            <section class="secao-estoque">

                <h2>EM ESTOQUE</h2>

                <div class="livro-estoque">

                    <div class="capa-livro">

                        <img
                            src="img/capa-o-menino-que-nao-sabia-ler.png"
                            alt="Capa do livro"
                        >

                    </div>

                    <div class="info-livro">

                        <h3 id="stockTitle">
                            O Menino Que Não Sabia Ler
                        </h3>

                        <p id="stockQty">
                            Quantidade disponível: 15
                        </p>

                    </div>

                </div>

            </section>

        </div>

    </main>

    <script src="js/layout.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
